name: Build and Publish Python Wheel

on:
  pull_request:
    branches: [ main, master ]
  push:
    branches: [ main, master ]
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      publish_target:
        description: "Publish target for manual run"
        required: true
        default: "none"
        type: choice
        options:
          - none
          - testpypi

jobs:
  build-macos-wheel:
    name: Build macOS wheel
    runs-on: macos-14
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build wheel and sdist
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine
          python -m build

      - name: Validate distributions
        run: python -m twine check dist/*

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-dist
          path: dist/*

  release-benchmark-gate:
    name: Release Benchmark Gate
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: macos-14
    timeout-minutes: 45
    env:
      QB_DEVICE: cpu
      QB_WARMUP: "10"
      QB_ITERS: "40"
      QB_TRACE_ITERS: "6"
      QB_SEED: "20260401"
      QB_VAR_REPEATS: "9"
      QB_VAR_WARMUP: "20"
      QB_VAR_ITERS: "160"
      QB_VAR_TRIM_RUNS: "2"
      QB_VAR_THRESHOLD_PCT: "2.0"
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install numpy
          python -m pip install -e .

      - name: Prepare release benchmark evidence directory
        run: |
          REPORT_DIR="benchmarks/reports/releases/${GITHUB_REF_NAME}"
          mkdir -p "$REPORT_DIR"
          echo "REPORT_DIR=$REPORT_DIR" >> "$GITHUB_ENV"

          cat > "$REPORT_DIR/release_bench_commands.txt" <<'CMD'
          python benchmarks/python/quick_bench.py --device ${QB_DEVICE} --warmup ${QB_WARMUP} --iters ${QB_ITERS} --seed ${QB_SEED} --out ${REPORT_DIR}/quick_bench.csv
          python benchmarks/python/quick_bench_ci_summary.py --input ${REPORT_DIR}/quick_bench.csv --json ${REPORT_DIR}/quick_bench_summary.json --md ${REPORT_DIR}/quick_bench_summary.md --regress-threshold 1.0
          python benchmarks/python/quick_bench_variance_gate.py --runs-csv ${REPORT_DIR}/quick_bench_variance_runs.csv --json ${REPORT_DIR}/quick_bench_variance_summary.json --md ${REPORT_DIR}/quick_bench_variance_summary.md --repeats ${QB_VAR_REPEATS} --variance-threshold-pct ${QB_VAR_THRESHOLD_PCT} --device ${QB_DEVICE} --warmup ${QB_VAR_WARMUP} --iters ${QB_VAR_ITERS} --seed ${QB_SEED} --trim-runs ${QB_VAR_TRIM_RUNS}
          python benchmarks/python/engine_split_bench.py --device auto --warmup ${QB_WARMUP} --iters ${QB_ITERS} --trace-iters ${QB_TRACE_ITERS} --seed ${QB_SEED} --out-dir ${REPORT_DIR} --pure-csv engine_split_pure_lc.csv --pure-json engine_split_pure_lc.json --interop-csv engine_split_interop.csv --interop-json engine_split_interop.json
          CMD

      - name: Capture release benchmark environment
        run: |
          python - <<'PY'
          import importlib.metadata as md
          import json
          import os
          import platform
          import sys
          from pathlib import Path

          report_dir = Path(os.environ["REPORT_DIR"])
          report_dir.mkdir(parents=True, exist_ok=True)

          def _pkg_ver(name: str) -> str:
              try:
                  return md.version(name)
              except Exception:
                  return "n/a"

          env = {
              "release_tag": os.environ.get("GITHUB_REF_NAME", ""),
              "git_ref": os.environ.get("GITHUB_REF", ""),
              "git_sha": os.environ.get("GITHUB_SHA", ""),
              "workflow": os.environ.get("GITHUB_WORKFLOW", ""),
              "run_id": os.environ.get("GITHUB_RUN_ID", ""),
              "run_attempt": os.environ.get("GITHUB_RUN_ATTEMPT", ""),
              "runner_os": os.environ.get("RUNNER_OS", ""),
              "runner_arch": os.environ.get("RUNNER_ARCH", ""),
              "python_version": sys.version,
              "platform": {
                  "system": platform.system(),
                  "release": platform.release(),
                  "version": platform.version(),
                  "machine": platform.machine(),
                  "processor": platform.processor(),
                  "platform": platform.platform(),
              },
              "packages": {
                  "lightning-core": _pkg_ver("lightning-core"),
                  "numpy": _pkg_ver("numpy"),
                  "torch": _pkg_ver("torch"),
                  "pybind11": _pkg_ver("pybind11"),
                  "scikit-build-core": _pkg_ver("scikit-build-core"),
              },
          }

          try:
              import lightning_core as lc
              env["runtime"] = {
                  "backend_name": lc.backend_name(),
                  "metal_available": bool(lc.metal_available()),
                  "cuda_available": bool(lc.cuda_available()),
              }
          except Exception as exc:
              env["runtime"] = {"error": str(exc)}

          out = report_dir / "release_bench_environment.json"
          out.write_text(json.dumps(env, indent=2), encoding="utf-8")
          print(f"saved: {out}")
          PY

      - name: Run release quick benchmark
        run: |
          python benchmarks/python/quick_bench.py \
            --device "$QB_DEVICE" \
            --warmup "$QB_WARMUP" \
            --iters "$QB_ITERS" \
            --seed "$QB_SEED" \
            --out "$REPORT_DIR/quick_bench.csv" \
            > "$REPORT_DIR/quick_bench.log"
          cat "$REPORT_DIR/quick_bench.log"

      - name: Build release quick benchmark summary
        run: |
          python benchmarks/python/quick_bench_ci_summary.py \
            --input "$REPORT_DIR/quick_bench.csv" \
            --json "$REPORT_DIR/quick_bench_summary.json" \
            --md "$REPORT_DIR/quick_bench_summary.md" \
            --regress-threshold 1.0

      - name: Run release quick benchmark variance gate
        run: |
          python benchmarks/python/quick_bench_variance_gate.py \
            --runs-csv "$REPORT_DIR/quick_bench_variance_runs.csv" \
            --json "$REPORT_DIR/quick_bench_variance_summary.json" \
            --md "$REPORT_DIR/quick_bench_variance_summary.md" \
            --repeats "$QB_VAR_REPEATS" \
            --variance-threshold-pct "$QB_VAR_THRESHOLD_PCT" \
            --device "$QB_DEVICE" \
            --warmup "$QB_VAR_WARMUP" \
            --iters "$QB_VAR_ITERS" \
            --seed "$QB_SEED" \
            --trim-runs "$QB_VAR_TRIM_RUNS"

      - name: Run release engine split benchmark
        run: |
          python benchmarks/python/engine_split_bench.py \
            --device auto \
            --warmup "$QB_WARMUP" \
            --iters "$QB_ITERS" \
            --trace-iters "$QB_TRACE_ITERS" \
            --seed "$QB_SEED" \
            --out-dir "$REPORT_DIR" \
            --pure-csv engine_split_pure_lc.csv \
            --pure-json engine_split_pure_lc.json \
            --interop-csv engine_split_interop.csv \
            --interop-json engine_split_interop.json \
            > "$REPORT_DIR/engine_split_bench.log"
          cat "$REPORT_DIR/engine_split_bench.log"

      - name: Build release benchmark manifest
        run: |
          python - <<'PY'
          import hashlib
          import json
          import os
          from pathlib import Path

          report_dir = Path(os.environ["REPORT_DIR"])
          names = [
              "quick_bench.csv",
              "quick_bench.log",
              "quick_bench_summary.json",
              "quick_bench_summary.md",
              "quick_bench_variance_runs.csv",
              "quick_bench_variance_summary.json",
              "quick_bench_variance_summary.md",
              "engine_split_pure_lc.csv",
              "engine_split_pure_lc.json",
              "engine_split_interop.csv",
              "engine_split_interop.json",
              "engine_split_bench.log",
              "release_bench_environment.json",
              "release_bench_commands.txt",
          ]
          files = []
          def _append_file(p: Path):
              h = hashlib.sha256(p.read_bytes()).hexdigest() if p.exists() else ""
              files.append(
                  {
                      "name": p.name,
                      "path": str(p),
                      "exists": p.exists(),
                      "size_bytes": p.stat().st_size if p.exists() else 0,
                      "sha256": h,
                  }
              )

          for name in names:
              p = report_dir / name
              _append_file(p)
          for p in sorted(report_dir.glob("quick_bench_run_*.csv")):
              _append_file(p)
          for p in sorted(report_dir.glob("quick_bench_run_*.log")):
              _append_file(p)
          manifest = {
              "release_tag": os.environ.get("GITHUB_REF_NAME", ""),
              "git_sha": os.environ.get("GITHUB_SHA", ""),
              "workflow_run_id": os.environ.get("GITHUB_RUN_ID", ""),
              "workflow_run_attempt": os.environ.get("GITHUB_RUN_ATTEMPT", ""),
              "artifact_format_version": 1,
              "files": files,
          }
          out = report_dir / "release_bench_manifest.json"
          out.write_text(json.dumps(manifest, indent=2), encoding="utf-8")
          print(f"saved: {out}")
          PY

      - name: Publish release benchmark summary
        run: |
          echo "## Release Benchmark Gate Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- tag: \`$GITHUB_REF_NAME\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- git sha: \`$GITHUB_SHA\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- evidence dir: \`$REPORT_DIR\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- benchmark command metadata: \`$REPORT_DIR/release_bench_commands.txt\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- environment metadata: \`$REPORT_DIR/release_bench_environment.json\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- manifest: \`$REPORT_DIR/release_bench_manifest.json\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- variance gate threshold: \`CV <= ${QB_VAR_THRESHOLD_PCT}%\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- variance gate trim-runs: \`${QB_VAR_TRIM_RUNS}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- engine split evidence: \`$REPORT_DIR/engine_split_pure_lc.csv\`, \`$REPORT_DIR/engine_split_interop.csv\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          cat "$REPORT_DIR/quick_bench_summary.md" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          cat "$REPORT_DIR/quick_bench_variance_summary.md" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload release benchmark evidence
        uses: actions/upload-artifact@v4
        with:
          name: release-benchmark-evidence-${{ github.ref_name }}-${{ github.run_id }}
          if-no-files-found: error
          retention-days: 30
          path: |
            ${{ env.REPORT_DIR }}/quick_bench.csv
            ${{ env.REPORT_DIR }}/quick_bench.log
            ${{ env.REPORT_DIR }}/quick_bench_summary.json
            ${{ env.REPORT_DIR }}/quick_bench_summary.md
            ${{ env.REPORT_DIR }}/quick_bench_variance_runs.csv
            ${{ env.REPORT_DIR }}/quick_bench_variance_summary.json
            ${{ env.REPORT_DIR }}/quick_bench_variance_summary.md
            ${{ env.REPORT_DIR }}/quick_bench_run_*.csv
            ${{ env.REPORT_DIR }}/quick_bench_run_*.log
            ${{ env.REPORT_DIR }}/engine_split_pure_lc.csv
            ${{ env.REPORT_DIR }}/engine_split_pure_lc.json
            ${{ env.REPORT_DIR }}/engine_split_interop.csv
            ${{ env.REPORT_DIR }}/engine_split_interop.json
            ${{ env.REPORT_DIR }}/engine_split_bench.log
            ${{ env.REPORT_DIR }}/release_bench_environment.json
            ${{ env.REPORT_DIR }}/release_bench_commands.txt
            ${{ env.REPORT_DIR }}/release_bench_manifest.json

  publish-pypi:
    name: Publish to PyPI
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-macos-wheel, release-benchmark-gate]
    runs-on: ubuntu-latest
    environment:
      name: pypi
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@v4
        with:
          name: python-dist
          path: dist

      - name: Publish package distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true

  publish-testpypi:
    name: Publish to TestPyPI
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.publish_target == 'testpypi'
    needs: [build-macos-wheel]
    runs-on: ubuntu-latest
    environment:
      name: testpypi
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@v4
        with:
          name: python-dist
          path: dist

      - name: Publish package distributions to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          skip-existing: true
