name: Build and Publish Python Wheel

on:
  pull_request:
    branches: [ main, master ]
  push:
    branches: [ main, master ]
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      publish_target:
        description: "Publish target for manual run"
        required: true
        default: "none"
        type: choice
        options:
          - none
          - testpypi

jobs:
  build-macos-wheel:
    name: Build macOS wheel
    runs-on: macos-14
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build wheel and sdist
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine
          python -m build

      - name: Validate distributions
        run: python -m twine check dist/*

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-dist
          path: dist/*

  release-benchmark-gate:
    name: Release Benchmark Gate
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: macos-14
    timeout-minutes: 45
    env:
      LC_PHASE_B_CONTRACT_JSON: docs/phase_b_graph_contract.json
      LC_GRAPH_AB_WARMUP: "4"
      LC_GRAPH_AB_ITERS: "12"
      LC_GRAPH_AB_TRACE_ITERS: "6"
      LC_GRAPH_AB_FUSION_COST_MIN_SPEEDUP: "1.01"
      LC_GRAPH_AB_MIN_HOST_DISPATCH_REDUCTION_RATE_PCT: "25.0"
      LC_GRAPH_AB_MIN_CHAINED_LATENCY_REDUCTION_PCT: "15.0"
      LC_GRAPH_AB_MAX_UNSUPPORTED_RATIO_PCT: "40.0"
      LC_FUSION_MAX_CONV: "1.15"
      LC_FUSION_MAX_MATMUL: "1.90"
      LC_FUSION_MAX_ATTENTION: "2.20"
      LC_PHASE_B_EXIT_MIN_GRAPH_PIPELINE_ADOPTION_RATE_PCT: "100.0"
      LC_PHASE_B_EXIT_ALLOW_CHAIN_LATENCY_NOT_APPLICABLE: "true"
      LC_PHASE_C_CONTRACT_JSON: docs/phase_c_engine_contract.json
      LC_PHASE_D_CONTRACT_JSON: docs/phase_d_runner_contract.json
      LC_PHASE_E_CONTRACT_JSON: docs/engine_federation_contract.json
      LC_INTEROP_BOUNDARY_MAX_OVERHEAD_MS: "0.35"
      LC_INTEROP_BOUNDARY_MIN_REASON_COVERAGE_PCT: "100.0"
      LC_INTEROP_BOUNDARY_MAX_UPLOAD_OVERHEAD_MS: "0.12"
      LC_INTEROP_BOUNDARY_MAX_ENGINE_SWITCH_OVERHEAD_MS: "0.10"
      LC_INTEROP_BOUNDARY_MAX_COPY_OVERHEAD_MS: "0.20"
      LC_INTEROP_BOUNDARY_MAX_SYNC_OVERHEAD_MS: "0.08"
      LC_INTEROP_BOUNDARY_MIN_ZERO_COPY_FALLBACK_REASON_COVERAGE_PCT: "100.0"
      LC_FUSION_MIN_EXPLAIN_REASON_COVERAGE_PCT: "100.0"
      LC_TF_INTEROP_MIN_REASON_COVERAGE_PCT: "100.0"
      LC_TORCH_RUNNER_MIN_REASON_COVERAGE_PCT: "100.0"
      LC_TF_RUNNER_MIN_REASON_COVERAGE_PCT: "100.0"
      LC_PHASE_E_MIN_TORCH_REASON_COVERAGE_PCT: "100.0"
      LC_PHASE_E_MIN_TF_REASON_COVERAGE_PCT: "100.0"
      LC_PHASE_E_MIN_COREML_REASON_COVERAGE_PCT: "100.0"
      LC_PHASE_E_MIN_MLX_REASON_COVERAGE_PCT: "100.0"
      LC_PHASE_E_MIN_FEDERATION_REASON_COVERAGE_PCT: "100.0"
      LC_PHASE_E_MAX_BOUNDARY_OVERHEAD_MS: "6.0"
      LC_PHASE_E_MIN_PERF_EXPLAIN_COVERAGE_PCT: "100.0"
      LC_RUNNER_VARIANCE_MAX_CV_PCT: "2.0"
      QB_DEVICE: cpu
      QB_WARMUP: "10"
      QB_ITERS: "40"
      QB_TRACE_ITERS: "6"
      QB_SEED: "20260401"
      QB_VAR_REPEATS: "9"
      QB_VAR_WARMUP: "20"
      QB_VAR_ITERS: "160"
      QB_VAR_TRIM_RUNS: "2"
      QB_VAR_THRESHOLD_PCT: "2.0"
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install numpy
          python -m pip install -e .

      - name: Verify Phase B contract sync
        run: |
          python scripts/generate_phase_b_contract_docs.py --check
          python scripts/generate_phase_e_contract_docs.py --check
          python scripts/generate_import_export_matrix_docs.py --check
          python scripts/check_phase_b_contract_sync.py
          python scripts/check_phase_c_contract_sync.py
          python scripts/check_phase_d_contract_sync.py
          python scripts/check_phase_e_contract_sync.py
          python scripts/sync_release_metadata.py --check --expected-version "$GITHUB_REF_NAME"

      - name: Prepare release benchmark evidence directory
        run: |
          REPORT_DIR="benchmarks/reports/releases/${GITHUB_REF_NAME}"
          mkdir -p "$REPORT_DIR"
          echo "REPORT_DIR=$REPORT_DIR" >> "$GITHUB_ENV"

          cat > "$REPORT_DIR/release_bench_commands.txt" <<'CMD'
          python benchmarks/python/quick_bench.py --device ${QB_DEVICE} --warmup ${QB_WARMUP} --iters ${QB_ITERS} --seed ${QB_SEED} --out ${REPORT_DIR}/quick_bench.csv
          python benchmarks/python/quick_bench_ci_summary.py --input ${REPORT_DIR}/quick_bench.csv --json ${REPORT_DIR}/quick_bench_summary.json --md ${REPORT_DIR}/quick_bench_summary.md --regress-threshold 1.0
          python benchmarks/python/quick_bench_variance_gate.py --runs-csv ${REPORT_DIR}/quick_bench_variance_runs.csv --json ${REPORT_DIR}/quick_bench_variance_summary.json --md ${REPORT_DIR}/quick_bench_variance_summary.md --repeats ${QB_VAR_REPEATS} --variance-threshold-pct ${QB_VAR_THRESHOLD_PCT} --device ${QB_DEVICE} --warmup ${QB_VAR_WARMUP} --iters ${QB_VAR_ITERS} --seed ${QB_SEED} --trim-runs ${QB_VAR_TRIM_RUNS}
          python benchmarks/python/graph_eager_ab_bench.py --device auto --warmup ${LC_GRAPH_AB_WARMUP} --iters ${LC_GRAPH_AB_ITERS} --trace-iters ${LC_GRAPH_AB_TRACE_ITERS} --seed ${QB_SEED} --fusion-cost-min-speedup ${LC_GRAPH_AB_FUSION_COST_MIN_SPEEDUP} --require-host-dispatch-reduction --min-host-dispatch-reduction-rate-pct ${LC_GRAPH_AB_MIN_HOST_DISPATCH_REDUCTION_RATE_PCT} --require-chained-latency-reduction --min-chained-latency-reduction-pct ${LC_GRAPH_AB_MIN_CHAINED_LATENCY_REDUCTION_PCT} --require-max-unsupported-ratio-pct --max-unsupported-ratio-pct ${LC_GRAPH_AB_MAX_UNSUPPORTED_RATIO_PCT} --csv ${REPORT_DIR}/graph_eager_ab.csv --json ${REPORT_DIR}/graph_eager_ab.json --md ${REPORT_DIR}/graph_eager_ab.md
          python benchmarks/python/engine_split_bench.py --device auto --warmup ${QB_WARMUP} --iters ${QB_ITERS} --trace-iters ${QB_TRACE_ITERS} --seed ${QB_SEED} --require-shared-bench-coverage --require-max-boundary-overhead-ms --max-boundary-overhead-ms ${LC_INTEROP_BOUNDARY_MAX_OVERHEAD_MS} --require-boundary-reason-coverage --min-boundary-reason-coverage-pct ${LC_INTEROP_BOUNDARY_MIN_REASON_COVERAGE_PCT} --require-boundary-component-budgets --max-boundary-upload-overhead-ms ${LC_INTEROP_BOUNDARY_MAX_UPLOAD_OVERHEAD_MS} --max-boundary-engine-switch-overhead-ms ${LC_INTEROP_BOUNDARY_MAX_ENGINE_SWITCH_OVERHEAD_MS} --max-boundary-copy-overhead-ms ${LC_INTEROP_BOUNDARY_MAX_COPY_OVERHEAD_MS} --max-boundary-sync-overhead-ms ${LC_INTEROP_BOUNDARY_MAX_SYNC_OVERHEAD_MS} --require-zero-copy-fallback-reason-coverage --min-zero-copy-fallback-reason-coverage-pct ${LC_INTEROP_BOUNDARY_MIN_ZERO_COPY_FALLBACK_REASON_COVERAGE_PCT} --out-dir ${REPORT_DIR} --pure-csv engine_split_pure_lc.csv --pure-json engine_split_pure_lc.json --interop-csv engine_split_interop.csv --interop-json engine_split_interop.json
          python benchmarks/python/tf_interop_bench.py --device cpu --mode graph --warmup 4 --iters 20 --force-graph-policy-fallback --require-reason-coverage --min-reason-coverage-pct ${LC_TF_INTEROP_MIN_REASON_COVERAGE_PCT} --out-dir ${REPORT_DIR} --csv tf_interop.csv --json tf_interop.json
          python benchmarks/python/fusion_pilot_bench.py --device auto --warmup 6 --iters 24 --seed 20260408 --cost-model-min-speedup ${LC_GRAPH_AB_FUSION_COST_MIN_SPEEDUP} --max-fused-over-unfused-conv ${LC_FUSION_MAX_CONV} --max-fused-over-unfused-matmul ${LC_FUSION_MAX_MATMUL} --max-fused-over-unfused-attention ${LC_FUSION_MAX_ATTENTION} --require-explain-reason-coverage --min-explain-reason-coverage-pct ${LC_FUSION_MIN_EXPLAIN_REASON_COVERAGE_PCT} --csv ${REPORT_DIR}/fusion_pilot.csv --json ${REPORT_DIR}/fusion_pilot.json --md ${REPORT_DIR}/fusion_pilot.md
          python benchmarks/python/cost_model_v2_calibration.py --device auto --warmup 4 --iters 12 --json ${REPORT_DIR}/cost_model_v2_calibration.json --md ${REPORT_DIR}/cost_model_v2_calibration.md
          python benchmarks/python/model_runner_alpha_bench.py --device auto --warmup 4 --iters 20 --require-replay-match --validate-artifact-schema --csv ${REPORT_DIR}/model_runner_alpha.csv --json ${REPORT_DIR}/model_runner_alpha.json --md ${REPORT_DIR}/model_runner_alpha.md
          python benchmarks/python/torch_runner_adapter_bench.py --device cpu --warmup 4 --iters 20 --allow-fake-torch --require-reason-coverage --min-reason-coverage-pct ${LC_TORCH_RUNNER_MIN_REASON_COVERAGE_PCT} --require-budget-gate --max-boundary-overhead-ms 5.0 --out-dir ${REPORT_DIR} --csv torch_runner_adapter.csv --json torch_runner_adapter.json --md torch_runner_adapter.md
          python benchmarks/python/tf_runner_adapter_bench.py --device cpu --warmup 4 --iters 20 --require-reason-coverage --min-reason-coverage-pct ${LC_TF_RUNNER_MIN_REASON_COVERAGE_PCT} --require-artifact-schema --out-dir ${REPORT_DIR} --csv tf_runner_adapter.csv --json tf_runner_adapter.json --md tf_runner_adapter.md
          python benchmarks/python/coreml_runner_adapter_bench.py --device cpu --warmup 4 --iters 20 --require-reason-coverage --min-reason-coverage-pct ${LC_PHASE_E_MIN_COREML_REASON_COVERAGE_PCT} --require-budget-gate --max-boundary-overhead-ms ${LC_PHASE_E_MAX_BOUNDARY_OVERHEAD_MS} --out-dir ${REPORT_DIR} --csv coreml_runner_adapter.csv --json coreml_runner_adapter.json --md coreml_runner_adapter.md
          python benchmarks/python/mlx_runner_adapter_bench.py --device cpu --warmup 4 --iters 20 --require-reason-coverage --min-reason-coverage-pct ${LC_PHASE_E_MIN_MLX_REASON_COVERAGE_PCT} --require-budget-gate --max-boundary-overhead-ms ${LC_PHASE_E_MAX_BOUNDARY_OVERHEAD_MS} --out-dir ${REPORT_DIR} --csv mlx_runner_adapter.csv --json mlx_runner_adapter.json --md mlx_runner_adapter.md
          python benchmarks/python/interop_perf_gate_v2.py --engine-interop-json ${REPORT_DIR}/engine_split_interop.json --torch-adapter-json ${REPORT_DIR}/torch_runner_adapter.json --tf-runner-json ${REPORT_DIR}/tf_runner_adapter.json --coreml-adapter-json ${REPORT_DIR}/coreml_runner_adapter.json --mlx-adapter-json ${REPORT_DIR}/mlx_runner_adapter.json --out-json ${REPORT_DIR}/interop_perf_gate_v2.json --out-md ${REPORT_DIR}/interop_perf_gate_v2.md --max-boundary-overhead-ms ${LC_PHASE_E_MAX_BOUNDARY_OVERHEAD_MS} --min-reason-coverage-pct ${LC_PHASE_E_MIN_FEDERATION_REASON_COVERAGE_PCT} --min-perf-explain-coverage-pct ${LC_PHASE_E_MIN_PERF_EXPLAIN_COVERAGE_PCT} --require-reason-coverage --require-perf-explain-coverage --require-max-boundary-overhead-ms --require-pass
          python benchmarks/python/model_runner_variance_gate.py --runs-csv ${REPORT_DIR}/model_runner_variance_runs.csv --json ${REPORT_DIR}/model_runner_variance_summary.json --md ${REPORT_DIR}/model_runner_variance_summary.md --repeats 5 --variance-threshold-pct ${LC_RUNNER_VARIANCE_MAX_CV_PCT} --device cpu --warmup 2 --iters 8 --seed 20260411 --trim-runs 1 --require-pass
          python benchmarks/python/phase_b_exit_audit.py --graph-json ${REPORT_DIR}/graph_eager_ab.json --contract-json docs/phase_b_graph_contract.json --out-json ${REPORT_DIR}/phase_b_exit_audit.json --out-md ${REPORT_DIR}/phase_b_exit_audit.md --bundle-json ${REPORT_DIR}/phase_b_exit_candidate_bundle.json --target-graph-pipeline-adoption-rate-pct ${LC_PHASE_B_EXIT_MIN_GRAPH_PIPELINE_ADOPTION_RATE_PCT} --allow-chain-latency-not-applicable --require-artifacts --artifact ${REPORT_DIR}/quick_bench.csv --artifact ${REPORT_DIR}/quick_bench_summary.json --artifact ${REPORT_DIR}/quick_bench_variance_summary.json --artifact ${REPORT_DIR}/graph_eager_ab.csv --artifact ${REPORT_DIR}/graph_eager_ab.json --artifact ${REPORT_DIR}/engine_split_pure_lc.csv --artifact ${REPORT_DIR}/engine_split_pure_lc.json --artifact ${REPORT_DIR}/engine_split_interop.csv --artifact ${REPORT_DIR}/engine_split_interop.json --artifact ${REPORT_DIR}/fusion_pilot.csv --artifact ${REPORT_DIR}/fusion_pilot.json --artifact ${REPORT_DIR}/release_bench_environment.json --artifact ${REPORT_DIR}/release_bench_commands.txt --readme README.md --roadmap ROADMAP.md --expected-version ${GITHUB_REF_NAME} --require-doc-sync --require-pass
          python benchmarks/python/phase_c_exit_audit.py --graph-json ${REPORT_DIR}/graph_eager_ab.json --fusion-json ${REPORT_DIR}/fusion_pilot.json --engine-interop-json ${REPORT_DIR}/engine_split_interop.json --tf-interop-json ${REPORT_DIR}/tf_interop.json --model-runner-json ${REPORT_DIR}/model_runner_alpha.json --cost-calibration-json ${REPORT_DIR}/cost_model_v2_calibration.json --prior-audit-json ${REPORT_DIR}/phase_c_exit_audit_prev.json --contract-json ${LC_PHASE_C_CONTRACT_JSON} --out-json ${REPORT_DIR}/phase_c_exit_audit.json --out-md ${REPORT_DIR}/phase_c_exit_audit.md --bundle-json ${REPORT_DIR}/phase_c_exit_candidate_bundle.json --require-artifacts --artifact ${REPORT_DIR}/graph_eager_ab.json --artifact ${REPORT_DIR}/fusion_pilot.json --artifact ${REPORT_DIR}/engine_split_interop.json --artifact ${REPORT_DIR}/tf_interop.json --artifact ${REPORT_DIR}/model_runner_alpha.json --artifact ${REPORT_DIR}/cost_model_v2_calibration.json --readme README.md --roadmap ROADMAP.md --expected-version ${GITHUB_REF_NAME} --require-doc-sync --require-pass
          python benchmarks/python/phase_d_exit_audit.py --torch-adapter-json ${REPORT_DIR}/torch_runner_adapter.json --tf-runner-json ${REPORT_DIR}/tf_runner_adapter.json --runner-variance-json ${REPORT_DIR}/model_runner_variance_summary.json --contract-json ${LC_PHASE_D_CONTRACT_JSON} --quickstart docs/quickstart.md --out-json ${REPORT_DIR}/phase_d_exit_audit.json --out-md ${REPORT_DIR}/phase_d_exit_audit.md --bundle-json ${REPORT_DIR}/phase_d_exit_candidate_bundle.json --require-artifacts --artifact ${REPORT_DIR}/torch_runner_adapter.json --artifact ${REPORT_DIR}/tf_runner_adapter.json --artifact ${REPORT_DIR}/model_runner_variance_summary.json --readme README.md --roadmap ROADMAP.md --expected-version ${GITHUB_REF_NAME} --require-doc-sync --require-pass
          python benchmarks/python/phase_e_exit_audit.py --interop-gate-json ${REPORT_DIR}/interop_perf_gate_v2.json --coreml-adapter-json ${REPORT_DIR}/coreml_runner_adapter.json --mlx-adapter-json ${REPORT_DIR}/mlx_runner_adapter.json --matrix-json docs/import_export_compatibility_matrix.json --contract-json ${LC_PHASE_E_CONTRACT_JSON} --out-json ${REPORT_DIR}/phase_e_exit_audit.json --out-md ${REPORT_DIR}/phase_e_exit_audit.md --bundle-json ${REPORT_DIR}/phase_e_exit_candidate_bundle.json --require-artifacts --artifact ${REPORT_DIR}/interop_perf_gate_v2.json --artifact ${REPORT_DIR}/coreml_runner_adapter.json --artifact ${REPORT_DIR}/mlx_runner_adapter.json --artifact docs/import_export_compatibility_matrix.json --readme README.md --roadmap ROADMAP.md --expected-version ${GITHUB_REF_NAME} --require-doc-sync --require-pass
          CMD

      - name: Generate version sync report (hard gate)
        run: |
          python scripts/sync_release_metadata.py \
            --check \
            --expected-version "$GITHUB_REF_NAME" \
            --report-json "$REPORT_DIR/version_sync_report.json" \
            --report-md "$REPORT_DIR/version_sync_report.md"

      - name: Capture release benchmark environment
        run: |
          python - <<'PY'
          import importlib.metadata as md
          import json
          import os
          import platform
          import sys
          from pathlib import Path

          report_dir = Path(os.environ["REPORT_DIR"])
          report_dir.mkdir(parents=True, exist_ok=True)

          def _pkg_ver(name: str) -> str:
              try:
                  return md.version(name)
              except Exception:
                  return "n/a"

          env = {
              "release_tag": os.environ.get("GITHUB_REF_NAME", ""),
              "git_ref": os.environ.get("GITHUB_REF", ""),
              "git_sha": os.environ.get("GITHUB_SHA", ""),
              "workflow": os.environ.get("GITHUB_WORKFLOW", ""),
              "run_id": os.environ.get("GITHUB_RUN_ID", ""),
              "run_attempt": os.environ.get("GITHUB_RUN_ATTEMPT", ""),
              "runner_os": os.environ.get("RUNNER_OS", ""),
              "runner_arch": os.environ.get("RUNNER_ARCH", ""),
              "python_version": sys.version,
              "platform": {
                  "system": platform.system(),
                  "release": platform.release(),
                  "version": platform.version(),
                  "machine": platform.machine(),
                  "processor": platform.processor(),
                  "platform": platform.platform(),
              },
              "packages": {
                  "lightning-core": _pkg_ver("lightning-core"),
                  "numpy": _pkg_ver("numpy"),
                  "torch": _pkg_ver("torch"),
                  "pybind11": _pkg_ver("pybind11"),
                  "scikit-build-core": _pkg_ver("scikit-build-core"),
              },
          }

          try:
              import lightning_core as lc
              env["runtime"] = {
                  "backend_name": lc.backend_name(),
                  "metal_available": bool(lc.metal_available()),
                  "cuda_available": bool(lc.cuda_available()),
              }
          except Exception as exc:
              env["runtime"] = {"error": str(exc)}

          out = report_dir / "release_bench_environment.json"
          out.write_text(json.dumps(env, indent=2), encoding="utf-8")
          print(f"saved: {out}")
          PY

      - name: Run release quick benchmark
        run: |
          python benchmarks/python/quick_bench.py \
            --device "$QB_DEVICE" \
            --warmup "$QB_WARMUP" \
            --iters "$QB_ITERS" \
            --seed "$QB_SEED" \
            --out "$REPORT_DIR/quick_bench.csv" \
            > "$REPORT_DIR/quick_bench.log"
          cat "$REPORT_DIR/quick_bench.log"

      - name: Build release quick benchmark summary
        run: |
          python benchmarks/python/quick_bench_ci_summary.py \
            --input "$REPORT_DIR/quick_bench.csv" \
            --json "$REPORT_DIR/quick_bench_summary.json" \
            --md "$REPORT_DIR/quick_bench_summary.md" \
            --regress-threshold 1.0

      - name: Run release quick benchmark variance gate
        run: |
          python benchmarks/python/quick_bench_variance_gate.py \
            --runs-csv "$REPORT_DIR/quick_bench_variance_runs.csv" \
            --json "$REPORT_DIR/quick_bench_variance_summary.json" \
            --md "$REPORT_DIR/quick_bench_variance_summary.md" \
            --repeats "$QB_VAR_REPEATS" \
            --variance-threshold-pct "$QB_VAR_THRESHOLD_PCT" \
            --device "$QB_DEVICE" \
            --warmup "$QB_VAR_WARMUP" \
            --iters "$QB_VAR_ITERS" \
            --seed "$QB_SEED" \
            --trim-runs "$QB_VAR_TRIM_RUNS"

      - name: Run release engine split benchmark
        run: |
          python benchmarks/python/engine_split_bench.py \
            --device auto \
            --warmup "$QB_WARMUP" \
            --iters "$QB_ITERS" \
            --trace-iters "$QB_TRACE_ITERS" \
            --seed "$QB_SEED" \
            --require-shared-bench-coverage \
            --require-max-boundary-overhead-ms \
            --max-boundary-overhead-ms "$LC_INTEROP_BOUNDARY_MAX_OVERHEAD_MS" \
            --require-boundary-reason-coverage \
            --min-boundary-reason-coverage-pct "$LC_INTEROP_BOUNDARY_MIN_REASON_COVERAGE_PCT" \
            --require-boundary-component-budgets \
            --max-boundary-upload-overhead-ms "$LC_INTEROP_BOUNDARY_MAX_UPLOAD_OVERHEAD_MS" \
            --max-boundary-engine-switch-overhead-ms "$LC_INTEROP_BOUNDARY_MAX_ENGINE_SWITCH_OVERHEAD_MS" \
            --max-boundary-copy-overhead-ms "$LC_INTEROP_BOUNDARY_MAX_COPY_OVERHEAD_MS" \
            --max-boundary-sync-overhead-ms "$LC_INTEROP_BOUNDARY_MAX_SYNC_OVERHEAD_MS" \
            --require-zero-copy-fallback-reason-coverage \
            --min-zero-copy-fallback-reason-coverage-pct "$LC_INTEROP_BOUNDARY_MIN_ZERO_COPY_FALLBACK_REASON_COVERAGE_PCT" \
            --out-dir "$REPORT_DIR" \
            --pure-csv engine_split_pure_lc.csv \
            --pure-json engine_split_pure_lc.json \
            --interop-csv engine_split_interop.csv \
            --interop-json engine_split_interop.json \
            > "$REPORT_DIR/engine_split_bench.log"
          cat "$REPORT_DIR/engine_split_bench.log"

      - name: Run release TF interop benchmark
        run: |
          python benchmarks/python/tf_interop_bench.py \
            --device cpu \
            --mode graph \
            --warmup 4 \
            --iters 20 \
            --force-graph-policy-fallback \
            --require-reason-coverage \
            --min-reason-coverage-pct "$LC_TF_INTEROP_MIN_REASON_COVERAGE_PCT" \
            --out-dir "$REPORT_DIR" \
            --csv tf_interop.csv \
            --json tf_interop.json \
            > "$REPORT_DIR/tf_interop.log"
          cat "$REPORT_DIR/tf_interop.log"

      - name: Run release graph/eager A/B benchmark
        run: |
          python benchmarks/python/graph_eager_ab_bench.py \
            --device auto \
            --warmup "$LC_GRAPH_AB_WARMUP" \
            --iters "$LC_GRAPH_AB_ITERS" \
            --trace-iters "$LC_GRAPH_AB_TRACE_ITERS" \
            --seed "$QB_SEED" \
            --fusion-cost-min-speedup "$LC_GRAPH_AB_FUSION_COST_MIN_SPEEDUP" \
            --require-host-dispatch-reduction \
            --min-host-dispatch-reduction-rate-pct "$LC_GRAPH_AB_MIN_HOST_DISPATCH_REDUCTION_RATE_PCT" \
            --require-chained-latency-reduction \
            --min-chained-latency-reduction-pct "$LC_GRAPH_AB_MIN_CHAINED_LATENCY_REDUCTION_PCT" \
            --require-max-unsupported-ratio-pct \
            --max-unsupported-ratio-pct "$LC_GRAPH_AB_MAX_UNSUPPORTED_RATIO_PCT" \
            --csv "$REPORT_DIR/graph_eager_ab.csv" \
            --json "$REPORT_DIR/graph_eager_ab.json" \
            --md "$REPORT_DIR/graph_eager_ab.md" \
            > "$REPORT_DIR/graph_eager_ab.log"
          cat "$REPORT_DIR/graph_eager_ab.log"

      - name: Run release fusion pilot benchmark (v2)
        run: |
          python benchmarks/python/fusion_pilot_bench.py \
