name: CI Contract Tests

on:
  pull_request:
    branches: [ main, master ]
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  cmake-ctest-gate:
    name: CMake + CTest Gate (macOS)
    runs-on: macos-14
    timeout-minutes: 40
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify generated docs blocks are up-to-date
        run: |
          python3 scripts/generate_capability_docs.py --check
          python3 scripts/generate_phase_b_contract_docs.py --check
          python3 scripts/check_phase_b_contract_sync.py
          python3 scripts/check_phase_c_contract_sync.py
          python3 scripts/generate_roadmap_history.py --check
          python3 scripts/generate_api_reference_docs.py --check
          python3 scripts/check_docs_links.py README.md docs

      - name: Configure (tests only)
        run: |
          cmake -S . -B build-ci \
            -DCMAKE_BUILD_TYPE=Release \
            -DCJ_ENABLE_METAL=ON \
            -DCJ_BUILD_TESTS=ON \
            -DCJ_BUILD_BENCHMARKS=OFF \
            -DCJ_BUILD_PYTHON=OFF \
            -DCJ_BUILD_EXAMPLES=OFF

      - name: Build
        run: cmake --build build-ci -j 4

      - name: Run CTest
        run: |
          set -o pipefail
          ctest --test-dir build-ci --output-on-failure --no-tests=error | tee build-ci/ctest.log

      - name: Run Contract Regression Subset (hard gate)
        run: |
          set -o pipefail
          ctest --test-dir build-ci --output-on-failure --no-tests=error \
            -R "test_tensor|test_tensor_contract_freeze|test_graph_ir" | tee build-ci/ctest-contract.log

      - name: Run Python smoke (integrated API + timeline)
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install numpy
          python3 -m pip install -e .
          python3 tests/test_python_tensor_contract_smoke.py
          python3 tests/test_python_integrated_timeline_smoke.py
          python3 tests/test_python_checkpoint_io_smoke.py
          python3 tests/test_python_checkpoint_integrity_v12_smoke.py
          python3 tests/test_python_graph_fallback_numerical_stress.py
          python3 tests/test_python_autograd_bootstrap_smoke.py
          python3 tests/test_python_autograd_v1_smoke.py
          python3 tests/test_python_model_runner_alpha_smoke.py
          python3 tests/test_python_interop_boundary_smoke.py
          python3 tests/test_python_graph_validation_report_smoke.py
          python3 tests/test_python_operator_onboarding_smoke.py
          python3 tests/test_python_phase_b_exit_audit_smoke.py
          python3 tests/test_python_phase_c_exit_audit_smoke.py

      - name: Publish CTest summary
        if: always()
        run: |
          echo "## CTest Gate Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [ -f build-ci/ctest.log ]; then
            grep -E "100% tests passed|tests failed out of|Total Test time" build-ci/ctest.log >> "$GITHUB_STEP_SUMMARY" || true
          else
            echo "- ctest log not found" >> "$GITHUB_STEP_SUMMARY"
          fi
          if [ -f build-ci/ctest-contract.log ]; then
            grep -E "100% tests passed|tests failed out of|Total Test time" build-ci/ctest-contract.log >> "$GITHUB_STEP_SUMMARY" || true
          else
            echo "- contract subset log not found" >> "$GITHUB_STEP_SUMMARY"
          fi
          echo "- python smoke: tests/test_python_tensor_contract_smoke.py" >> "$GITHUB_STEP_SUMMARY"
          echo "- python smoke: tests/test_python_integrated_timeline_smoke.py" >> "$GITHUB_STEP_SUMMARY"
          echo "- python smoke: tests/test_python_checkpoint_io_smoke.py" >> "$GITHUB_STEP_SUMMARY"
          echo "- python smoke: tests/test_python_checkpoint_integrity_v12_smoke.py" >> "$GITHUB_STEP_SUMMARY"
          echo "- python smoke: tests/test_python_graph_fallback_numerical_stress.py" >> "$GITHUB_STEP_SUMMARY"
          echo "- python smoke: tests/test_python_autograd_bootstrap_smoke.py" >> "$GITHUB_STEP_SUMMARY"
          echo "- python smoke: tests/test_python_autograd_v1_smoke.py" >> "$GITHUB_STEP_SUMMARY"
          echo "- python smoke: tests/test_python_model_runner_alpha_smoke.py" >> "$GITHUB_STEP_SUMMARY"
          echo "- python smoke: tests/test_python_interop_boundary_smoke.py" >> "$GITHUB_STEP_SUMMARY"
          echo "- python smoke: tests/test_python_graph_validation_report_smoke.py" >> "$GITHUB_STEP_SUMMARY"
          echo "- python smoke: tests/test_python_operator_onboarding_smoke.py" >> "$GITHUB_STEP_SUMMARY"
          echo "- python smoke: tests/test_python_phase_b_exit_audit_smoke.py" >> "$GITHUB_STEP_SUMMARY"
          echo "- python smoke: tests/test_python_phase_c_exit_audit_smoke.py" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload CTest artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ctest-gate-artifacts-${{ github.run_id }}
          if-no-files-found: warn
          retention-days: 14
          path: |
            build-ci/ctest.log
            build-ci/ctest-contract.log
            build-ci/CMakeCache.txt
            build-ci/CMakeFiles/CMakeOutput.log
            build-ci/CMakeFiles/CMakeError.log
            build-ci/Testing
