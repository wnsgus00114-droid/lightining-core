name: Benchmark Artifact Report

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  quick-benchmark:
    name: Quick Benchmark Artifact
    runs-on: macos-14
    timeout-minutes: 45
    env:
      LC_PHASE_B_CONTRACT_JSON: docs/phase_b_graph_contract.json
      LC_GRAPH_AB_WARMUP: "4"
      LC_GRAPH_AB_ITERS: "12"
      LC_GRAPH_AB_TRACE_ITERS: "6"
      LC_GRAPH_AB_FUSION_COST_MIN_SPEEDUP: "1.01"
      LC_GRAPH_AB_MIN_HOST_DISPATCH_REDUCTION_RATE_PCT: "25.0"
      LC_FUSION_MAX_CONV: "1.15"
      LC_FUSION_MAX_MATMUL: "1.90"
      LC_FUSION_MAX_ATTENTION: "2.20"
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install numpy
          python -m pip install -e .

      - name: Verify Phase B contract sync
        run: |
          python scripts/generate_phase_b_contract_docs.py --check
          python scripts/check_phase_b_contract_sync.py

      - name: Run quick benchmark
        run: |
          mkdir -p benchmarks/reports/ci
          python benchmarks/python/quick_bench.py \
            --device cpu \
            --warmup 10 \
            --iters 40 \
            --out benchmarks/reports/ci/quick_bench.csv \
            > benchmarks/reports/ci/quick_bench.log
          cat benchmarks/reports/ci/quick_bench.log

      - name: Build benchmark summary
        run: |
          python benchmarks/python/quick_bench_ci_summary.py \
            --input benchmarks/reports/ci/quick_bench.csv \
            --json benchmarks/reports/ci/quick_bench_summary.json \
            --md benchmarks/reports/ci/quick_bench_summary.md \
            --regress-threshold 1.0

      - name: Run graph/eager A/B benchmark
        run: |
          python benchmarks/python/graph_eager_ab_bench.py \
            --device auto \
            --warmup "$LC_GRAPH_AB_WARMUP" \
            --iters "$LC_GRAPH_AB_ITERS" \
            --trace-iters "$LC_GRAPH_AB_TRACE_ITERS" \
            --fusion-cost-min-speedup "$LC_GRAPH_AB_FUSION_COST_MIN_SPEEDUP" \
            --require-host-dispatch-reduction \
            --min-host-dispatch-reduction-rate-pct "$LC_GRAPH_AB_MIN_HOST_DISPATCH_REDUCTION_RATE_PCT" \
            --csv benchmarks/reports/ci/graph_eager_ab.csv \
            --json benchmarks/reports/ci/graph_eager_ab.json \
            --md benchmarks/reports/ci/graph_eager_ab.md \
            > benchmarks/reports/ci/graph_eager_ab.log
          cat benchmarks/reports/ci/graph_eager_ab.log

      - name: Run engine split benchmark (pure-LC vs interop)
        run: |
          python benchmarks/python/engine_split_bench.py \
            --device auto \
            --warmup 10 \
            --iters 40 \
            --trace-iters 6 \
            --require-shared-bench-coverage \
            --out-dir benchmarks/reports/ci \
            --pure-csv engine_split_pure_lc.csv \
            --pure-json engine_split_pure_lc.json \
            --interop-csv engine_split_interop.csv \
            --interop-json engine_split_interop.json \
            > benchmarks/reports/ci/engine_split_bench.log
          cat benchmarks/reports/ci/engine_split_bench.log

      - name: Run fusion pilot benchmark (v2 patterns)
        run: |
          python benchmarks/python/fusion_pilot_bench.py \
            --device auto \
            --warmup 6 \
            --iters 24 \
            --seed 20260408 \
            --cost-model-min-speedup "$LC_GRAPH_AB_FUSION_COST_MIN_SPEEDUP" \
            --max-fused-over-unfused-conv "$LC_FUSION_MAX_CONV" \
            --max-fused-over-unfused-matmul "$LC_FUSION_MAX_MATMUL" \
            --max-fused-over-unfused-attention "$LC_FUSION_MAX_ATTENTION" \
            --csv benchmarks/reports/ci/fusion_pilot.csv \
            --json benchmarks/reports/ci/fusion_pilot.json \
            --md benchmarks/reports/ci/fusion_pilot.md \
            > benchmarks/reports/ci/fusion_pilot.log
          cat benchmarks/reports/ci/fusion_pilot.log

      - name: Publish summary to workflow
        if: always()
        run: |
          if [ -f benchmarks/reports/ci/quick_bench_summary.md ]; then
            cat benchmarks/reports/ci/quick_bench_summary.md >> "$GITHUB_STEP_SUMMARY"
          else
            echo "quick_bench summary not found." >> "$GITHUB_STEP_SUMMARY"
          fi
          if [ -f benchmarks/reports/ci/graph_eager_ab.md ]; then
            echo "" >> "$GITHUB_STEP_SUMMARY"
            cat benchmarks/reports/ci/graph_eager_ab.md >> "$GITHUB_STEP_SUMMARY"
          else
            echo "graph_eager_ab summary not found." >> "$GITHUB_STEP_SUMMARY"
          fi
          if [ -f benchmarks/reports/ci/engine_split_pure_lc.csv ] && [ -f benchmarks/reports/ci/engine_split_interop.csv ]; then
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "## Engine Split Snapshot" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "- files: \`engine_split_pure_lc.csv\`, \`engine_split_interop.csv\`" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "engine split benchmark outputs not found." >> "$GITHUB_STEP_SUMMARY"
          fi
          if [ -f benchmarks/reports/ci/fusion_pilot.md ]; then
            echo "" >> "$GITHUB_STEP_SUMMARY"
            cat benchmarks/reports/ci/fusion_pilot.md >> "$GITHUB_STEP_SUMMARY"
          else
            echo "fusion_pilot summary not found." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload benchmark artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: quick-benchmark-artifacts-${{ github.run_id }}
          if-no-files-found: warn
          retention-days: 14
          path: |
            benchmarks/reports/ci/quick_bench.csv
            benchmarks/reports/ci/quick_bench.log
            benchmarks/reports/ci/quick_bench_summary.json
            benchmarks/reports/ci/quick_bench_summary.md
            benchmarks/reports/ci/graph_eager_ab.csv
            benchmarks/reports/ci/graph_eager_ab.json
            benchmarks/reports/ci/graph_eager_ab.md
            benchmarks/reports/ci/graph_eager_ab.log
            benchmarks/reports/ci/engine_split_pure_lc.csv
            benchmarks/reports/ci/engine_split_pure_lc.json
            benchmarks/reports/ci/engine_split_interop.csv
            benchmarks/reports/ci/engine_split_interop.json
            benchmarks/reports/ci/engine_split_bench.log
            benchmarks/reports/ci/fusion_pilot.csv
            benchmarks/reports/ci/fusion_pilot.json
            benchmarks/reports/ci/fusion_pilot.md
            benchmarks/reports/ci/fusion_pilot.log
