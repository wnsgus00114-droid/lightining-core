name: Benchmark Artifact Report

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  quick-benchmark:
    name: Quick Benchmark Artifact
    runs-on: macos-14
    timeout-minutes: 45
    env:
      LC_PHASE_B_CONTRACT_JSON: docs/phase_b_graph_contract.json
      LC_PHASE_C_CONTRACT_JSON: docs/phase_c_engine_contract.json
      LC_GRAPH_AB_WARMUP: "4"
      LC_GRAPH_AB_ITERS: "12"
      LC_GRAPH_AB_TRACE_ITERS: "6"
      LC_GRAPH_AB_FUSION_COST_MIN_SPEEDUP: "1.01"
      LC_GRAPH_AB_MIN_HOST_DISPATCH_REDUCTION_RATE_PCT: "25.0"
      LC_GRAPH_AB_MIN_CHAINED_LATENCY_REDUCTION_PCT: "15.0"
      LC_GRAPH_AB_MAX_UNSUPPORTED_RATIO_PCT: "40.0"
      LC_FUSION_MAX_CONV: "1.15"
      LC_FUSION_MAX_MATMUL: "1.90"
      LC_FUSION_MAX_ATTENTION: "2.20"
      LC_PHASE_B_EXIT_MIN_GRAPH_PIPELINE_ADOPTION_RATE_PCT: "100.0"
      LC_PHASE_B_EXIT_ALLOW_CHAIN_LATENCY_NOT_APPLICABLE: "true"
      LC_INTEROP_BOUNDARY_MAX_OVERHEAD_MS: "0.35"
      LC_INTEROP_BOUNDARY_MIN_REASON_COVERAGE_PCT: "100.0"
      LC_INTEROP_BOUNDARY_MAX_UPLOAD_OVERHEAD_MS: "0.12"
      LC_INTEROP_BOUNDARY_MAX_ENGINE_SWITCH_OVERHEAD_MS: "0.10"
      LC_INTEROP_BOUNDARY_MAX_COPY_OVERHEAD_MS: "0.20"
      LC_INTEROP_BOUNDARY_MAX_SYNC_OVERHEAD_MS: "0.08"
      LC_INTEROP_BOUNDARY_MIN_ZERO_COPY_FALLBACK_REASON_COVERAGE_PCT: "100.0"
      LC_FUSION_MIN_EXPLAIN_REASON_COVERAGE_PCT: "100.0"
      LC_TF_INTEROP_MIN_REASON_COVERAGE_PCT: "100.0"
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install numpy
          python -m pip install -e .

      - name: Verify Phase B contract sync
        run: |
          python scripts/generate_phase_b_contract_docs.py --check
          python scripts/check_phase_b_contract_sync.py
          python scripts/check_phase_c_contract_sync.py
          python scripts/sync_release_metadata.py \
            --check \
            --report-json benchmarks/reports/ci/version_sync_report.json \
            --report-md benchmarks/reports/ci/version_sync_report.md

      - name: Run quick benchmark
        run: |
          mkdir -p benchmarks/reports/ci
          python benchmarks/python/quick_bench.py \
            --device cpu \
            --warmup 10 \
            --iters 40 \
            --out benchmarks/reports/ci/quick_bench.csv \
            > benchmarks/reports/ci/quick_bench.log
          cat benchmarks/reports/ci/quick_bench.log

      - name: Build benchmark summary
        run: |
          python benchmarks/python/quick_bench_ci_summary.py \
            --input benchmarks/reports/ci/quick_bench.csv \
            --json benchmarks/reports/ci/quick_bench_summary.json \
            --md benchmarks/reports/ci/quick_bench_summary.md \
            --regress-threshold 1.0

      - name: Run graph/eager A/B benchmark
        run: |
          python benchmarks/python/graph_eager_ab_bench.py \
            --device auto \
            --warmup "$LC_GRAPH_AB_WARMUP" \
            --iters "$LC_GRAPH_AB_ITERS" \
            --trace-iters "$LC_GRAPH_AB_TRACE_ITERS" \
            --fusion-cost-min-speedup "$LC_GRAPH_AB_FUSION_COST_MIN_SPEEDUP" \
            --require-host-dispatch-reduction \
            --min-host-dispatch-reduction-rate-pct "$LC_GRAPH_AB_MIN_HOST_DISPATCH_REDUCTION_RATE_PCT" \
            --require-chained-latency-reduction \
            --min-chained-latency-reduction-pct "$LC_GRAPH_AB_MIN_CHAINED_LATENCY_REDUCTION_PCT" \
            --require-max-unsupported-ratio-pct \
            --max-unsupported-ratio-pct "$LC_GRAPH_AB_MAX_UNSUPPORTED_RATIO_PCT" \
            --csv benchmarks/reports/ci/graph_eager_ab.csv \
            --json benchmarks/reports/ci/graph_eager_ab.json \
            --md benchmarks/reports/ci/graph_eager_ab.md \
            > benchmarks/reports/ci/graph_eager_ab.log
          cat benchmarks/reports/ci/graph_eager_ab.log

      - name: Run engine split benchmark (pure-LC vs interop)
        run: |
          python benchmarks/python/engine_split_bench.py \
            --device auto \
            --warmup 10 \
            --iters 40 \
            --trace-iters 6 \
            --require-shared-bench-coverage \
            --require-max-boundary-overhead-ms \
            --max-boundary-overhead-ms "$LC_INTEROP_BOUNDARY_MAX_OVERHEAD_MS" \
            --require-boundary-reason-coverage \
            --min-boundary-reason-coverage-pct "$LC_INTEROP_BOUNDARY_MIN_REASON_COVERAGE_PCT" \
            --require-boundary-component-budgets \
            --max-boundary-upload-overhead-ms "$LC_INTEROP_BOUNDARY_MAX_UPLOAD_OVERHEAD_MS" \
            --max-boundary-engine-switch-overhead-ms "$LC_INTEROP_BOUNDARY_MAX_ENGINE_SWITCH_OVERHEAD_MS" \
            --max-boundary-copy-overhead-ms "$LC_INTEROP_BOUNDARY_MAX_COPY_OVERHEAD_MS" \
            --max-boundary-sync-overhead-ms "$LC_INTEROP_BOUNDARY_MAX_SYNC_OVERHEAD_MS" \
            --require-zero-copy-fallback-reason-coverage \
            --min-zero-copy-fallback-reason-coverage-pct "$LC_INTEROP_BOUNDARY_MIN_ZERO_COPY_FALLBACK_REASON_COVERAGE_PCT" \
            --out-dir benchmarks/reports/ci \
            --pure-csv engine_split_pure_lc.csv \
            --pure-json engine_split_pure_lc.json \
            --interop-csv engine_split_interop.csv \
            --interop-json engine_split_interop.json \
            > benchmarks/reports/ci/engine_split_bench.log
          cat benchmarks/reports/ci/engine_split_bench.log

      - name: Run TF interop benchmark
        run: |
          python benchmarks/python/tf_interop_bench.py \
            --device cpu \
            --mode graph \
            --warmup 4 \
            --iters 20 \
            --force-graph-policy-fallback \
            --require-reason-coverage \
            --min-reason-coverage-pct "$LC_TF_INTEROP_MIN_REASON_COVERAGE_PCT" \
            --out-dir benchmarks/reports/ci \
            --csv tf_interop.csv \
            --json tf_interop.json \
            > benchmarks/reports/ci/tf_interop.log
          cat benchmarks/reports/ci/tf_interop.log

      - name: Run cost model v2 calibration
        run: |
          python benchmarks/python/cost_model_v2_calibration.py \
            --device auto \
            --warmup 4 \
            --iters 12 \
            --json benchmarks/reports/ci/cost_model_v2_calibration.json \
            --md benchmarks/reports/ci/cost_model_v2_calibration.md \
            > benchmarks/reports/ci/cost_model_v2_calibration.log
          cat benchmarks/reports/ci/cost_model_v2_calibration.log

      - name: Run model runner alpha benchmark
        run: |
          python benchmarks/python/model_runner_alpha_bench.py \
            --device auto \
            --warmup 4 \
            --iters 20 \
            --require-replay-match \
            --validate-artifact-schema \
            --csv benchmarks/reports/ci/model_runner_alpha.csv \
            --json benchmarks/reports/ci/model_runner_alpha.json \
            --md benchmarks/reports/ci/model_runner_alpha.md \
            > benchmarks/reports/ci/model_runner_alpha.log
          cat benchmarks/reports/ci/model_runner_alpha.log

      - name: Run fusion pilot benchmark (v2 patterns)
        run: |
          python benchmarks/python/fusion_pilot_bench.py \
            --device auto \
            --warmup 6 \
            --iters 24 \
            --seed 20260408 \
            --cost-model-min-speedup "$LC_GRAPH_AB_FUSION_COST_MIN_SPEEDUP" \
            --max-fused-over-unfused-conv "$LC_FUSION_MAX_CONV" \
            --max-fused-over-unfused-matmul "$LC_FUSION_MAX_MATMUL" \
            --max-fused-over-unfused-attention "$LC_FUSION_MAX_ATTENTION" \
            --require-explain-reason-coverage \
            --min-explain-reason-coverage-pct "$LC_FUSION_MIN_EXPLAIN_REASON_COVERAGE_PCT" \
            --csv benchmarks/reports/ci/fusion_pilot.csv \
            --json benchmarks/reports/ci/fusion_pilot.json \
            --md benchmarks/reports/ci/fusion_pilot.md \
            > benchmarks/reports/ci/fusion_pilot.log
          cat benchmarks/reports/ci/fusion_pilot.log

      - name: Run Phase B exit audit
        run: |
          if [ "$LC_PHASE_B_EXIT_ALLOW_CHAIN_LATENCY_NOT_APPLICABLE" = "true" ]; then
            CHAIN_APPLICABLE_FLAG="--allow-chain-latency-not-applicable"
          else
            CHAIN_APPLICABLE_FLAG="--no-allow-chain-latency-not-applicable"
          fi

          python benchmarks/python/phase_b_exit_audit.py \
            --graph-json benchmarks/reports/ci/graph_eager_ab.json \
            --contract-json docs/phase_b_graph_contract.json \
            --out-json benchmarks/reports/ci/phase_b_exit_audit.json \
            --out-md benchmarks/reports/ci/phase_b_exit_audit.md \
            --bundle-json benchmarks/reports/ci/phase_b_exit_candidate_bundle.json \
            --target-graph-pipeline-adoption-rate-pct "$LC_PHASE_B_EXIT_MIN_GRAPH_PIPELINE_ADOPTION_RATE_PCT" \
            $CHAIN_APPLICABLE_FLAG \
            --require-artifacts \
            --artifact benchmarks/reports/ci/quick_bench.csv \
            --artifact benchmarks/reports/ci/quick_bench_summary.json \
            --artifact benchmarks/reports/ci/graph_eager_ab.csv \
            --artifact benchmarks/reports/ci/graph_eager_ab.json \
            --artifact benchmarks/reports/ci/engine_split_pure_lc.csv \
            --artifact benchmarks/reports/ci/engine_split_pure_lc.json \
            --artifact benchmarks/reports/ci/engine_split_interop.csv \
            --artifact benchmarks/reports/ci/engine_split_interop.json \
            --artifact benchmarks/reports/ci/fusion_pilot.csv \
            --artifact benchmarks/reports/ci/fusion_pilot.json \
            --require-pass \
            > benchmarks/reports/ci/phase_b_exit_audit.log
          cat benchmarks/reports/ci/phase_b_exit_audit.log

      - name: Run Phase C exit audit
        run: |
          python benchmarks/python/phase_c_exit_audit.py \
            --graph-json benchmarks/reports/ci/graph_eager_ab.json \
            --fusion-json benchmarks/reports/ci/fusion_pilot.json \
            --engine-interop-json benchmarks/reports/ci/engine_split_interop.json \
            --tf-interop-json benchmarks/reports/ci/tf_interop.json \
            --model-runner-json benchmarks/reports/ci/model_runner_alpha.json \
            --cost-calibration-json benchmarks/reports/ci/cost_model_v2_calibration.json \
            --contract-json "$LC_PHASE_C_CONTRACT_JSON" \
            --out-json benchmarks/reports/ci/phase_c_exit_audit.json \
            --out-md benchmarks/reports/ci/phase_c_exit_audit.md \
            --bundle-json benchmarks/reports/ci/phase_c_exit_candidate_bundle.json \
            --require-artifacts \
            --artifact benchmarks/reports/ci/graph_eager_ab.json \
            --artifact benchmarks/reports/ci/fusion_pilot.json \
            --artifact benchmarks/reports/ci/engine_split_interop.json \
            --artifact benchmarks/reports/ci/tf_interop.json \
            --artifact benchmarks/reports/ci/model_runner_alpha.json \
            --artifact benchmarks/reports/ci/cost_model_v2_calibration.json \
            --require-pass \
            > benchmarks/reports/ci/phase_c_exit_audit.log
          cat benchmarks/reports/ci/phase_c_exit_audit.log

      - name: Publish summary to workflow
        if: always()
        run: |
          if [ -f benchmarks/reports/ci/quick_bench_summary.md ]; then
            cat benchmarks/reports/ci/quick_bench_summary.md >> "$GITHUB_STEP_SUMMARY"
          else
            echo "quick_bench summary not found." >> "$GITHUB_STEP_SUMMARY"
          fi
          if [ -f benchmarks/reports/ci/graph_eager_ab.md ]; then
            echo "" >> "$GITHUB_STEP_SUMMARY"
            cat benchmarks/reports/ci/graph_eager_ab.md >> "$GITHUB_STEP_SUMMARY"
          else
            echo "graph_eager_ab summary not found." >> "$GITHUB_STEP_SUMMARY"
          fi
          if [ -f benchmarks/reports/ci/engine_split_pure_lc.csv ] && [ -f benchmarks/reports/ci/engine_split_interop.csv ]; then
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "## Engine Split Snapshot" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "- files: \`engine_split_pure_lc.csv\`, \`engine_split_interop.csv\`" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "engine split benchmark outputs not found." >> "$GITHUB_STEP_SUMMARY"
          fi
          if [ -f benchmarks/reports/ci/fusion_pilot.md ]; then
            echo "" >> "$GITHUB_STEP_SUMMARY"
            cat benchmarks/reports/ci/fusion_pilot.md >> "$GITHUB_STEP_SUMMARY"
          else
            echo "fusion_pilot summary not found." >> "$GITHUB_STEP_SUMMARY"
          fi
          if [ -f benchmarks/reports/ci/tf_interop.json ]; then
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "## TF Interop Snapshot" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "- file: \`tf_interop.json\`" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "tf_interop output not found." >> "$GITHUB_STEP_SUMMARY"
          fi
          if [ -f benchmarks/reports/ci/phase_b_exit_audit.md ]; then
            echo "" >> "$GITHUB_STEP_SUMMARY"
            cat benchmarks/reports/ci/phase_b_exit_audit.md >> "$GITHUB_STEP_SUMMARY"
          else
            echo "phase_b_exit_audit summary not found." >> "$GITHUB_STEP_SUMMARY"
          fi
          if [ -f benchmarks/reports/ci/model_runner_alpha.md ]; then
            echo "" >> "$GITHUB_STEP_SUMMARY"
            cat benchmarks/reports/ci/model_runner_alpha.md >> "$GITHUB_STEP_SUMMARY"
          fi
          if [ -f benchmarks/reports/ci/phase_c_exit_audit.md ]; then
            echo "" >> "$GITHUB_STEP_SUMMARY"
            cat benchmarks/reports/ci/phase_c_exit_audit.md >> "$GITHUB_STEP_SUMMARY"
          else
            echo "phase_c_exit_audit summary not found." >> "$GITHUB_STEP_SUMMARY"
          fi
          if [ -f benchmarks/reports/ci/version_sync_report.md ]; then
            echo "" >> "$GITHUB_STEP_SUMMARY"
            cat benchmarks/reports/ci/version_sync_report.md >> "$GITHUB_STEP_SUMMARY"
          else
            echo "version_sync_report summary not found." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload benchmark artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: quick-benchmark-artifacts-${{ github.run_id }}
          if-no-files-found: warn
          retention-days: 14
          path: |
            benchmarks/reports/ci/quick_bench.csv
            benchmarks/reports/ci/quick_bench.log
            benchmarks/reports/ci/quick_bench_summary.json
            benchmarks/reports/ci/quick_bench_summary.md
            benchmarks/reports/ci/graph_eager_ab.csv
            benchmarks/reports/ci/graph_eager_ab.json
            benchmarks/reports/ci/graph_eager_ab.md
            benchmarks/reports/ci/graph_eager_ab.log
            benchmarks/reports/ci/engine_split_pure_lc.csv
            benchmarks/reports/ci/engine_split_pure_lc.json
            benchmarks/reports/ci/engine_split_interop.csv
            benchmarks/reports/ci/engine_split_interop.json
            benchmarks/reports/ci/engine_split_bench.log
            benchmarks/reports/ci/tf_interop.csv
            benchmarks/reports/ci/tf_interop.json
            benchmarks/reports/ci/tf_interop.log
            benchmarks/reports/ci/cost_model_v2_calibration.json
            benchmarks/reports/ci/cost_model_v2_calibration.md
            benchmarks/reports/ci/cost_model_v2_calibration.log
            benchmarks/reports/ci/model_runner_alpha.csv
            benchmarks/reports/ci/model_runner_alpha.json
            benchmarks/reports/ci/model_runner_alpha.md
            benchmarks/reports/ci/model_runner_alpha.log
            benchmarks/reports/ci/fusion_pilot.csv
            benchmarks/reports/ci/fusion_pilot.json
            benchmarks/reports/ci/fusion_pilot.md
            benchmarks/reports/ci/fusion_pilot.log
            benchmarks/reports/ci/phase_b_exit_audit.json
            benchmarks/reports/ci/phase_b_exit_audit.md
            benchmarks/reports/ci/phase_b_exit_candidate_bundle.json
            benchmarks/reports/ci/phase_b_exit_audit.log
            benchmarks/reports/ci/phase_c_exit_audit.json
            benchmarks/reports/ci/phase_c_exit_audit.md
            benchmarks/reports/ci/phase_c_exit_candidate_bundle.json
            benchmarks/reports/ci/phase_c_exit_audit.log
            benchmarks/reports/ci/version_sync_report.json
            benchmarks/reports/ci/version_sync_report.md
