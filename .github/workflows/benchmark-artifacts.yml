name: Benchmark Artifact Report

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  quick-benchmark:
    name: Quick Benchmark Artifact
    runs-on: macos-14
    timeout-minutes: 45
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install numpy
          python -m pip install -e .

      - name: Run quick benchmark
        run: |
          mkdir -p benchmarks/reports/ci
          python benchmarks/python/quick_bench.py \
            --device cpu \
            --warmup 10 \
            --iters 40 \
            --out benchmarks/reports/ci/quick_bench.csv \
            > benchmarks/reports/ci/quick_bench.log
          cat benchmarks/reports/ci/quick_bench.log

      - name: Build benchmark summary
        run: |
          python benchmarks/python/quick_bench_ci_summary.py \
            --input benchmarks/reports/ci/quick_bench.csv \
            --json benchmarks/reports/ci/quick_bench_summary.json \
            --md benchmarks/reports/ci/quick_bench_summary.md \
            --regress-threshold 1.0

      - name: Run graph/eager A/B benchmark
        run: |
          python benchmarks/python/graph_eager_ab_bench.py \
            --device auto \
            --warmup 4 \
            --iters 12 \
            --trace-iters 6 \
            --csv benchmarks/reports/ci/graph_eager_ab.csv \
            --json benchmarks/reports/ci/graph_eager_ab.json \
            --md benchmarks/reports/ci/graph_eager_ab.md \
            > benchmarks/reports/ci/graph_eager_ab.log
          cat benchmarks/reports/ci/graph_eager_ab.log

      - name: Publish summary to workflow
        if: always()
        run: |
          if [ -f benchmarks/reports/ci/quick_bench_summary.md ]; then
            cat benchmarks/reports/ci/quick_bench_summary.md >> "$GITHUB_STEP_SUMMARY"
          else
            echo "quick_bench summary not found." >> "$GITHUB_STEP_SUMMARY"
          fi
          if [ -f benchmarks/reports/ci/graph_eager_ab.md ]; then
            echo "" >> "$GITHUB_STEP_SUMMARY"
            cat benchmarks/reports/ci/graph_eager_ab.md >> "$GITHUB_STEP_SUMMARY"
          else
            echo "graph_eager_ab summary not found." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload benchmark artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: quick-benchmark-artifacts-${{ github.run_id }}
          if-no-files-found: warn
          retention-days: 14
          path: |
            benchmarks/reports/ci/quick_bench.csv
            benchmarks/reports/ci/quick_bench.log
            benchmarks/reports/ci/quick_bench_summary.json
            benchmarks/reports/ci/quick_bench_summary.md
            benchmarks/reports/ci/graph_eager_ab.csv
            benchmarks/reports/ci/graph_eager_ab.json
            benchmarks/reports/ci/graph_eager_ab.md
            benchmarks/reports/ci/graph_eager_ab.log
