name: Exia Tests

on:
  push:
    paths:
      - "Exia/**"
      - ".github/workflows/exia-tests.yml"
  pull_request:
    paths:
      - "Exia/**"
      - ".github/workflows/exia-tests.yml"
  workflow_dispatch:

jobs:
  exia-tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - mode: standalone
            extras: dev
            backend: lightning
          - mode: torch
            extras: dev,torch
            backend: torch

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Exia (${{ matrix.mode }})
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e "./Exia[${{ matrix.extras }}]"

      - name: Run pytest
        env:
          EXIA_BACKEND: ${{ matrix.backend }}
        run: |
          pytest -q Exia/tests

      - name: Torch backend smoke
        if: matrix.mode == 'torch'
        env:
          EXIA_BACKEND: torch
        run: |
          python -c "import Exia as ex; x = ex.tensor([[1.0, 2.0]]); print(type(x).__name__)"
